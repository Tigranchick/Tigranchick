name: Profile telemetry

on:
  schedule:
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Update telemetry block
        env:
          GITHUB_TOKEN: ${{ secrets.GH_STATS_TOKEN || github.token }}
          PROFILE_OWNER: Tigranchick
          PROFILE_TIMEZONE: Asia/Almaty
        run: node .github/scripts/update-readme.mjs

      - name: Commit README update
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update profile telemetry"
          git push
